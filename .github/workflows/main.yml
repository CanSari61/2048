name: Android APK Olustur

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3

      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Capacitor Yukle
        run: npm install

      - name: Android Projesini Hazirla
        run: |
          npx cap add android
          npx cap sync android

      - name: Java Kurulumu
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: APK Derleme İslemi
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK'yi Yukari Cikar (Indirme Linki)
        uses: actions/upload-artifact@v3
        with:
          name: Wood-2048-Oyun-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
