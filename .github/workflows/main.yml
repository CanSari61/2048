name: Android APK Olustur

on:
  push:
    branches: [ "main", "master", "ana" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Kutuphaneleri Yukle
        run: npm install

      - name: Capacitor Android Ekle
        run: |
          npx cap add android || echo "Android zaten ekli, devam ediyorum..."
          npx cap sync android

      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK Kurulumu
        uses: android-actions/setup-android@v3

      - name: APK Derleme İslemi
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK'yi Yukari Cikar
        uses: actions/upload-artifact@v4
        with:
          name: Wood-2048-Oyun-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
