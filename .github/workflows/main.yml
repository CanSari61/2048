name: Android APK Olustur

on:
  push:
    branches: [ "main", "master", "ana" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerekli Kutuphaneleri Zorla Yukle
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Dosya ve Klasorleri Duzenle
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          echo '{ "appId": "com.wood2048.game", "appName": "2048", "webDir": "www", "bundledWebRuntime": false }' > capacitor.config.json

      - name: Android Altyapisini Kur
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Java 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: APK Derleme
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: APK Dosyasini Cikar
        uses: actions/upload-artifact@v4
        with:
          name: 2048-Oyun-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk


