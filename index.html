<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahşap 2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        /* Genel Ayarlar */
        body, html {
            overscroll-behavior: none;
            touch-action: none;
            font-family: 'Fredoka One', cursive, sans-serif;
            background-color: #2e1c0d; 
            background-image: radial-gradient(circle, #3e2723 0%, #1a0f07 100%);
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
        }

        /* --- SADE VE AKICI GİRİŞ ANİMASYONLARI (DONANIM HIZLANDIRMALI) --- */
        
        /* 1. Üst Menü İnişi */
        @keyframes dropHeader {
            0% { opacity: 0; transform: translate3d(0, -50px, 0) scale(0.95); }
            60% { transform: translate3d(0, 10px, 0) scale(1); }
            100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }
        .anim-header-seq {
            opacity: 0;
            will-change: transform, opacity;
            animation: dropHeader 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 2. Oyun Tahtasının Zıplayarak Gelmesi (Kasan Box-Shadow animasyonu iptal edildi) */
        @keyframes bounceBoard {
            0% { opacity: 0; transform: translate3d(0, 60px, 0) scale(0.9); }
            60% { opacity: 1; transform: translate3d(0, -10px, 0) scale(1.02); }
            100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }
        .anim-board-seq {
            opacity: 0;
            will-change: transform, opacity;
            animation: bounceBoard 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        }

        /* 3. Boş Yuvaların Sırayla Parlaması (Performanslı Yöntem) */
        @keyframes rippleOpacity {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* --- KUSURSUZ TAHTA ÖLÇÜLERİ --- */
        :root {
            --board-size: 420px;
            --gap: 12px;
            --tile-size: calc((var(--board-size) - 5 * var(--gap)) / 4);
        }

        @media (max-width: 450px) {
            :root {
                --board-size: 92vw;
                --gap: 2.5vw;
            }
        }

        .board-container {
            width: var(--board-size);
            height: var(--board-size);
            background-color: #5c3a21; 
            border-radius: 12px;
            padding: var(--gap);
            position: relative;
            border: 3px solid #3e2723;
            /* Kasan box-shadow burada sabit tutuluyor, animasyona sokulmuyor */
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 3px 5px rgba(255,255,255,0.15);
        }

        .grid-bg {
            display: grid;
            grid-template-columns: repeat(4, var(--tile-size));
            grid-template-rows: repeat(4, var(--tile-size));
            gap: var(--gap);
            width: 100%;
            height: 100%;
        }
        
        .grid-cell {
            background-color: #452b17; 
            border-radius: 8px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5), inset 0 -1px 2px rgba(255,255,255,0.05);
            position: relative; /* Sahte element için gerekli */
        }

        /* Kasmayan Işık Dalgası Efekti (GPU Opacity) */
        .grid-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-color: #6a4628; 
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.8), inset 0 0 15px rgba(232, 195, 158, 0.2);
            opacity: 0; /* Başlangıçta gizli */
            pointer-events: none;
            will-change: opacity;
        }
        .ripple-cell::after {
            animation: rippleOpacity 0.5s ease-in-out;
        }

        .tile-layer {
            position: absolute;
            top: var(--gap);
            left: var(--gap);
            width: calc(100% - 2 * var(--gap));
            height: calc(100% - 2 * var(--gap));
            pointer-events: none;
            z-index: 10;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            transition: transform 0.12s ease-in-out;
            will-change: transform;
            transform: translate3d(
                calc(var(--c) * (var(--tile-size) + var(--gap))),
                calc(var(--r) * (var(--tile-size) + var(--gap))),
                0
            );
        }

        .tile-inner {
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), inset 0 2px 2px rgba(255,255,255,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            text-shadow: 0 2px 2px rgba(0,0,0,0.3);
            will-change: transform;
        }

        /* Ahşap Blok Renkleri */
        .wood-tile-2 { background-color: #e8c39e; color: #4a2c16; text-shadow: 0 1px 1px rgba(255,255,255,0.4); box-shadow: 0 4px 0 #bca083, inset 0 2px 2px rgba(255,255,255,0.3); } 
        .wood-tile-4 { background-color: #dfab7a; color: #4a2c16; text-shadow: 0 1px 1px rgba(255,255,255,0.4); box-shadow: 0 4px 0 #b38962, inset 0 2px 2px rgba(255,255,255,0.3); } 
        .wood-tile-8 { background-color: #d69156; color: #fff; box-shadow: 0 4px 0 #a87244, inset 0 2px 2px rgba(255,255,255,0.2); } 
        .wood-tile-16 { background-color: #cc7432; color: #fff; box-shadow: 0 4px 0 #995726, inset 0 2px 2px rgba(255,255,255,0.2); } 
        .wood-tile-32 { background-color: #c35712; color: #fff; box-shadow: 0 4px 0 #93420d, inset 0 2px 2px rgba(255,255,255,0.2); } 
        .wood-tile-64 { background-color: #a63c06; color: #fff; box-shadow: 0 4px 0 #7a2b04, inset 0 2px 2px rgba(255,255,255,0.2); } 
        .wood-tile-128 { background-color: #e6c13c; color: #fff; box-shadow: 0 4px 0 #b3962e, 0 0 10px rgba(230,193,60,0.4), inset 0 2px 2px rgba(255,255,255,0.4); }
        .wood-tile-256 { background-color: #d9b024; color: #fff; box-shadow: 0 4px 0 #a6871c, 0 0 15px rgba(217,176,36,0.5), inset 0 2px 2px rgba(255,255,255,0.4); }
        .wood-tile-512 { background-color: #cc9f0e; color: #fff; box-shadow: 0 4px 0 #99770a, 0 0 20px rgba(204,159,14,0.6), inset 0 2px 2px rgba(255,255,255,0.4); }
        .wood-tile-1024 { background-color: #b38800; color: #fff; box-shadow: 0 4px 0 #806000, 0 0 25px rgba(179,136,0,0.7), inset 0 2px 2px rgba(255,255,255,0.4); font-size: 2.2rem; }
        .wood-tile-2048 { background-color: #997300; color: #fff; box-shadow: 0 4px 0 #664d00, 0 0 30px rgba(153,115,0,0.8), inset 0 2px 2px rgba(255,255,255,0.4); font-size: 2.2rem; }
        .wood-tile-super { background-color: #4a2c16; color: #e6c13c; border: 2px solid #e6c13c; box-shadow: 0 4px 0 #2e1c0d, 0 0 40px rgba(230,193,60,0.9); font-size: 2.2rem; }

        @media (max-width: 400px) {
            .wood-tile-1024, .wood-tile-2048, .wood-tile-super { font-size: 1.75rem; }
        }

        /* Özel Animasyon Sınıfları */
        @keyframes strongAppear {
            0% { transform: scale(0) rotate(-10deg); }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        .new-tile .tile-inner { animation: strongAppear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
        @keyframes softAppear { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .load-tile .tile-inner { animation: softAppear 0.3s ease-out backwards; } 
        .pop .tile-inner { animation: pop 0.2s ease-in-out backwards; }

        .wood-btn {
            background-color: #795548;
            border-bottom: 4px solid #4e342e;
            transition: all 0.1s;
        }
        .wood-btn:active {
            border-bottom: 0px;
            transform: translateY(4px);
        }
    </style>
</head>
<body class="text-[#d7ccc8] flex flex-col items-center justify-center relative w-full h-full">

    <div class="w-full flex flex-col items-center justify-center p-4 z-10">
        <!-- Üst Menü -->
        <div class="anim-header-seq w-full max-w-[420px] flex justify-between items-center mb-6">
            <h1 class="text-5xl font-extrabold text-[#e8c39e] drop-shadow-md tracking-wider">2048</h1>
            <div class="flex gap-3 text-white font-bold text-center tracking-wide">
                <div class="bg-[#4e342e] shadow-inner rounded-md px-4 py-2 flex flex-col justify-center border-t border-[#795548] min-w-[80px]">
                    <span class="text-[#a1887f] text-[10px] uppercase mb-1">Skor</span>
                    <span id="score" class="text-lg">0</span>
                </div>
                <div class="bg-[#4e342e] shadow-inner rounded-md px-4 py-2 flex flex-col justify-center border-t border-[#795548] min-w-[80px]">
                    <span class="text-[#a1887f] text-[10px] uppercase mb-1">En İyi</span>
                    <span id="best-score" class="text-lg">0</span>
                </div>
            </div>
        </div>

        <!-- Alt Menü -->
        <div class="anim-header-seq w-full max-w-[420px] flex justify-between items-center mb-8" style="animation-delay: 0.1s;">
            <p class="text-sm text-[#a1887f]">Birleştir ve <strong>2048</strong>'i yakala!</p>
            <button onclick="startNewGame()" class="wood-btn text-[#efebe9] font-bold py-2 px-6 rounded-md uppercase tracking-wider text-sm pointer-events-auto">
                Yeni Oyun
            </button>
        </div>

        <!-- Oyun Alanı -->
        <div class="anim-board-seq board-container" id="board-container">
            <div class="grid-bg" id="grid-bg">
                <div class="grid-cell" id="cell-0"></div><div class="grid-cell" id="cell-1"></div><div class="grid-cell" id="cell-2"></div><div class="grid-cell" id="cell-3"></div>
                <div class="grid-cell" id="cell-4"></div><div class="grid-cell" id="cell-5"></div><div class="grid-cell" id="cell-6"></div><div class="grid-cell" id="cell-7"></div>
                <div class="grid-cell" id="cell-8"></div><div class="grid-cell" id="cell-9"></div><div class="grid-cell" id="cell-10"></div><div class="grid-cell" id="cell-11"></div>
                <div class="grid-cell" id="cell-12"></div><div class="grid-cell" id="cell-13"></div><div class="grid-cell" id="cell-14"></div><div class="grid-cell" id="cell-15"></div>
            </div>
            
            <div id="tile-layer" class="tile-layer"></div>

            <div id="game-over" class="absolute inset-0 bg-[#2e1c0d] bg-opacity-80 z-50 flex flex-col items-center justify-center rounded-lg hidden backdrop-blur-sm">
                <h2 class="text-5xl font-bold text-[#e8c39e] mb-6 drop-shadow-lg">Oyun Bitti!</h2>
                <button onclick="startNewGame()" class="wood-btn text-white font-bold py-3 px-8 rounded-md text-lg uppercase">
                    Tekrar Oyna
                </button>
            </div>
        </div>

        <!-- İpucu -->
        <p class="anim-header-seq mt-10 text-xs text-[#795548] max-w-md text-center" style="animation-delay: 0.2s;">İpucu: Ekranın herhangi bir yerinden parmağınızı kaydırabilirsiniz.</p>
    </div>

    <script>
        const tileLayer = document.getElementById('tile-layer');
        const scoreElement = document.getElementById('score');
        const bestScoreElement = document.getElementById('best-score');
        const gameOverElement = document.getElementById('game-over');
        const boardContainer = document.getElementById('board-container');

        let grid = []; 
        let tiles = []; 
        let score = 0;
        let bestScore = localStorage.getItem('wood-2048-best') || 0;
        let isAnimating = true; 
        let tileIdCounter = 0;

        bestScoreElement.textContent = bestScore;

        class Tile {
            constructor(r, c, val) {
                this.id = tileIdCounter++;
                this.r = r; this.c = c; this.val = val;
                this.element = null; this.isMerged = false; this.markedForDeletion = false;
            }
        }

        function saveGameState() {
            const gridValues = grid.map(row => row.map(tile => tile ? tile.val : null));
            const gameState = { grid: gridValues, score: score, bestScore: bestScore, isGameOver: !gameOverElement.classList.contains('hidden') };
            localStorage.setItem('wood-2048-save', JSON.stringify(gameState));
            localStorage.setItem('wood-2048-best', bestScore);
        }

        function loadGameState() {
            const savedData = localStorage.getItem('wood-2048-save');
            if (savedData) return JSON.parse(savedData);
            return null;
        }

        // --- SADE GİRİŞ (Dalga Efekti) ---
        function playIntroSequence(savedState, forceNew) {
            isAnimating = true; 
            tileLayer.innerHTML = ''; 

            // Tahtanın gelmesini bekle (1.1s)
            setTimeout(() => {
                let cellDelay = 0;
                const cells = Array.from({length: 16}, (_, i) => i).sort(() => Math.random() - 0.5);
                
                // Hücreler parlar
                cells.forEach((cellIndex, i) => {
                    setTimeout(() => {
                        const cellElem = document.getElementById(`cell-${cellIndex}`);
                        if(cellElem) {
                            cellElem.classList.add('ripple-cell');
                            setTimeout(() => cellElem.classList.remove('ripple-cell'), 500);
                        }
                    }, i * 30); 
                });

                // Parlamadan sonra taşları diz
                setTimeout(() => {
                    placeInitialTiles(savedState, forceNew);
                }, cells.length * 30 + 100);

            }, 1100); 
        }

        function placeInitialTiles(savedState, forceNew) {
            if (savedState && savedState.grid && !savedState.isGameOver && !forceNew) {
                score = savedState.score || 0;
                bestScore = savedState.bestScore || bestScore;
                
                let delayCounter = 0;
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        const val = savedState.grid[r][c];
                        if (val) {
                            setTimeout(() => {
                                let newTile = new Tile(r, c, val);
                                grid[r][c] = newTile;
                                tiles.push(newTile);
                                createTileDOM(newTile, 'load-tile'); 
                            }, delayCounter * 40);
                            delayCounter++;
                        }
                    }
                }
                setTimeout(() => { isAnimating = false; }, delayCounter * 40 + 300);
            } else {
                setTimeout(() => { addRandomTile(); }, 0);
                setTimeout(() => { addRandomTile(); isAnimating = false; saveGameState();}, 200);
            }
            updateScoreUI();
        }

        function initGame(forceNew = false) {
            tiles = [];
            grid = [...Array(4)].map(() => Array(4).fill(null));
            score = 0;
            gameOverElement.classList.add('hidden');
            
            const savedState = loadGameState();
            
            if(forceNew) {
                boardContainer.classList.remove('anim-board-seq');
                void boardContainer.offsetWidth; 
                boardContainer.classList.add('anim-board-seq');
            }

            playIntroSequence(savedState, forceNew);
        }

        function startNewGame() { initGame(true); }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (!grid[r][c]) emptyCells.push({r, c});
                }
            }

            if (emptyCells.length > 0) {
                let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                let val = Math.random() < 0.9 ? 2 : 4;
                let newTile = new Tile(randomCell.r, randomCell.c, val);
                grid[randomCell.r][randomCell.c] = newTile;
                tiles.push(newTile);
                createTileDOM(newTile, 'new-tile');
            }
        }

        function createTileDOM(tile, animClass) {
            let tileDiv = document.createElement('div');
            tileDiv.className = `tile ${animClass}`; 
            tileDiv.style.setProperty('--r', tile.r);
            tileDiv.style.setProperty('--c', tile.c);
            tileDiv.id = `tile-${tile.id}`;
            tile.element = tileDiv;

            let innerDiv = document.createElement('div');
            let colorClass = tile.val > 2048 ? 'wood-tile-super' : `wood-tile-${tile.val}`;
            innerDiv.className = `tile-inner text-3xl md:text-4xl ${colorClass}`;
            innerDiv.textContent = tile.val;

            tileDiv.appendChild(innerDiv);
            tileLayer.appendChild(tileDiv);

            setTimeout(() => {
                if(tileDiv.parentElement) tileDiv.classList.remove(animClass);
            }, 500); 
        }

        function updateDOM_Positions() {
            tiles.forEach(tile => {
                tile.element.style.setProperty('--r', tile.r);
                tile.element.style.setProperty('--c', tile.c);
                if (tile.markedForDeletion) tile.element.style.zIndex = 10;
                else tile.element.style.zIndex = 20;
            });
        }

        function finalizeMove() {
            tiles = tiles.filter(tile => {
                if (tile.markedForDeletion) {
                    tile.element.remove();
                    return false;
                }
                return true;
            });

            tiles.forEach(tile => {
                if (tile.isMerged) {
                    let inner = tile.element.querySelector('.tile-inner');
                    let colorClass = tile.val > 2048 ? 'wood-tile-super' : `wood-tile-${tile.val}`;
                    inner.className = `tile-inner text-3xl md:text-4xl ${colorClass}`;
                    inner.textContent = tile.val;
                    
                    tile.element.classList.add('pop');
                    tile.isMerged = false;
                    
                    setTimeout(() => {
                        if(tile.element.parentElement) tile.element.classList.remove('pop');
                    }, 200);
                }
            });
        }

        function updateScoreUI() {
            scoreElement.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = bestScore;
            }
        }

        function move(direction) {
            if (isAnimating) return;

            tiles.forEach(t => { t.oldR = t.r; t.oldC = t.c; });
            let newGrid = [...Array(4)].map(() => Array(4).fill(null));
            
            if (direction === 'Left') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(t => t !== null);
                    let newCol = 0;
                    for (let i = 0; i < row.length; i++) {
                        if (i < row.length - 1 && row[i].val === row[i+1].val) {
                            row[i].val *= 2; row[i].isMerged = true; row[i].c = newCol;
                            row[i+1].markedForDeletion = true; row[i+1].c = newCol; 
                            newGrid[r][newCol] = row[i]; score += row[i].val; i++;
                        } else {
                            row[i].c = newCol; newGrid[r][newCol] = row[i];
                        }
                        newCol++;
                    }
                }
            } 
            else if (direction === 'Right') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(t => t !== null).reverse();
                    let newCol = 3;
                    for (let i = 0; i < row.length; i++) {
                        if (i < row.length - 1 && row[i].val === row[i+1].val) {
                            row[i].val *= 2; row[i].isMerged = true; row[i].c = newCol;
                            row[i+1].markedForDeletion = true; row[i+1].c = newCol;
                            newGrid[r][newCol] = row[i]; score += row[i].val; i++;
                        } else {
                            row[i].c = newCol; newGrid[r][newCol] = row[i];
                        }
                        newCol--;
                    }
                }
            }
            else if (direction === 'Up') {
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) if (grid[r][c]) col.push(grid[r][c]);
                    let newRow = 0;
                    for (let i = 0; i < col.length; i++) {
                        if (i < col.length - 1 && col[i].val === col[i+1].val) {
                            col[i].val *= 2; col[i].isMerged = true; col[i].r = newRow;
                            col[i+1].markedForDeletion = true; col[i+1].r = newRow;
                            newGrid[newRow][c] = col[i]; score += col[i].val; i++;
                        } else {
                            col[i].r = newRow; newGrid[newRow][c] = col[i];
                        }
                        newRow++;
                    }
                }
            }
            else if (direction === 'Down') {
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 3; r >= 0; r--) if (grid[r][c]) col.push(grid[r][c]);
                    let newRow = 3;
                    for (let i = 0; i < col.length; i++) {
                        if (i < col.length - 1 && col[i].val === col[i+1].val) {
                            col[i].val *= 2; col[i].isMerged = true; col[i].r = newRow;
                            col[i+1].markedForDeletion = true; col[i+1].r = newRow;
                            newGrid[newRow][c] = col[i]; score += col[i].val; i++;
                        } else {
                            col[i].r = newRow; newGrid[newRow][c] = col[i];
                        }
                        newRow--;
                    }
                }
            }

            grid = newGrid;
            let moved = false;
            tiles.forEach(t => { if (t.r !== t.oldR || t.c !== t.oldC) moved = true; });

            if (!moved) return;

            isAnimating = true;
            updateScoreUI();
            updateDOM_Positions(); 

            setTimeout(() => {
                finalizeMove(); 
                addRandomTile(); 
                if (checkGameOver()) gameOverElement.classList.remove('hidden');
                saveGameState();
                isAnimating = false; 
            }, 120); 
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!grid[r][c]) return false;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    let current = grid[r][c].val;
                    if (c < 3 && current === grid[r][c+1].val) return false;
                    if (r < 3 && current === grid[r+1][c].val) return false;
                }
            }
            return true;
        }

        document.addEventListener('keydown', (e) => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault(); 
            if (e.code === 'ArrowLeft') move('Left');
            else if (e.code === 'ArrowRight') move('Right');
            else if (e.code === 'ArrowUp') move('Up');
            else if (e.code === 'ArrowDown') move('Down');
        });

        let touchStartX = 0; let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.target.closest('button') || isAnimating) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchend', (e) => {
            if (e.target.closest('button') || touchStartX === 0 || isAnimating) return;
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) dx > 0 ? move('Right') : move('Left');
                else dy > 0 ? move('Down') : move('Up');
            }
            touchStartX = 0; touchStartY = 0;
        }, {passive: false});

        initGame(false);
    </script>
</body>
</html>
